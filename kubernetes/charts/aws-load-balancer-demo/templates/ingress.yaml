{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1

kind: Ingress

metadata:

  name: nginx

  namespace: {{ .Values.namespace }}

  annotations:

    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.scheme }}

    alb.ingress.kubernetes.io/target-type: {{ .Values.ingress.targetType }}

    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn | quote }}

    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'

    alb.ingress.kubernetes.io/ssl-redirect: {{ .Values.ingress.sslRedirect | quote }}

    external-dns.alpha.kubernetes.io/hostname: {{ .Values.ingress.hostname }}


spec:

  ingressClassName: {{ .Values.ingress.className }}

  rules:

  - host: {{ .Values.ingress.hostname }}

    http:

      paths:

      - path: /

        pathType: Prefix

        backend:

          service:

            name: nginx

            port:

              number: 80

{{- end }}
