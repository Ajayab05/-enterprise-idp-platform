apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: nginx
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Ajayab05/-enterprise-idp-platform.git
    targetRevision: main
    path: kubernetes/charts/aws-load-balancer-demo

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
