apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: enterprise-default
spec:
  amiFamily: AL2023

  amiSelectorTerms:
    - alias: al2023@latest

  role: enterprise-idp-lab-karpenter-node

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: enterprise-idp-lab-eks

  securityGroupSelectorTerms:
    - id: sg-07aa1adb86fbdffe3

  tags:
    Name: enterprise-idp-karpenter-node
    Environment: lab
    Project: enterprise-idp
    ManagedBy: Karpenter

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true

  metadataOptions:
    httpEndpoint: enabled
    httpTokens: required
    httpPutResponseHopLimit: 2
